<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Editor</title>
    <link rel="stylesheet" href="./editor.css">
</head>
<body>
    <h1>Debug Test</h1>
    <pre id="output"></pre>

    <script src="https://unpkg.com/mithril@2.0.4/mithril.min.js"></script>
    <script type="module">
        const output = document.getElementById('output');

        try {
            output.textContent = 'Cargando editor-core.js...';

            // Cargar editor-core primero
            const coreModule = await import('./editor-core.js');
            output.textContent = 'editor-core.js cargado: ' + Object.keys(coreModule).slice(0,5).join(', ');

        } catch (err) {
            output.textContent = 'Error: ' + err.message;
            console.error(err);
        }
    </script>
</body>
</html>
